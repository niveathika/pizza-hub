openapi: 3.0.1
info:
  title: Delivery
  version: 0.1.0
servers:
  - url: http://{server}:{port}/delivery
    variables:
      server:
        default: localhost
      port:
        default: '9090'
paths:
  /quotes:
    get:
      operationId: getQuotes
      parameters:
        - name: orderId
          in: query
          required: true
          schema:
            type: string
        - name: address
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeliveryEtaResponse'
        '400':
          description: BadRequest
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
        '500':
          description: InternalServerError
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
components:
  schemas:
    DeliveryEtaResponse:
      required:
        - deliveryPartner
        - etaMinutes
        - orderId
      type: object
      properties:
        orderId:
          type: string
        deliveryPartner:
          type: string
        etaMinutes:
          type: integer
          format: int64
      additionalProperties: false
    ErrorPayload:
      required:
        - message
        - method
        - path
        - reason
        - status
        - timestamp
      type: object
      properties:
        timestamp:
          type: string
        status:
          type: integer
          format: int64
        reason:
          type: string
        message:
          type: string
        path:
          type: string
        method:
          type: string
  securitySchemes:
    wso2CloudApiKeyAuth:
      type: apiKey
      in: header
      name: Choreo-API-Key
      x-ballerina-name: choreoAPIKey
security:
  - wso2CloudApiKeyAuth: []
